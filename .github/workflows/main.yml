name: Note AI Agent

on:
  workflow_dispatch: # 手動実行用
  schedule:
    - cron: '21 16 * * *'  # 日本時間 朝1:21

permissions:
  contents: write

# 💡 「警告を消す魔法の呪文」！
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 💡 2026年最新の v4 にアップグレード！
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug files
        run: |

      # 💡 2026年最新の v5 にアップグレード！
      - name: Set up Python
        uses: actions/setup-python@v5

        with:
          python-version: '3.11' # 将来のサポート終了に備えて3.11にアップグレード！

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-genai # 最新のGeminiライブラリに切り替え

      - name: Run Python script
        env:
          # 💡 ここでGitHubのSecretsをPythonのプログラムに引き渡しているよ！
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python main.py
     

      - name: Commit history
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add combination_history.json

          git diff --cached --quiet || git commit -m "Update combination history"

          git push
