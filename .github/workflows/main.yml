name: Note AI Agent

on:
  workflow_dispatch: # 手動実行用
  schedule:
    - cron: '15 20 * * *'  # 日本時間 朝5:15（みんなが寝ている間にズラして確実に）
    - cron: '15 8 * * *'   # 日本時間 夕方17:15（激混みの18:00を避けて確実に！）

# 💡 ここに「警告を消す魔法の呪文」を2行追加したよ！
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 💡 2026年最新の v4 にアップグレード！
      - name: Checkout code
        uses: actions/checkout@v4

      # 💡 2026年最新の v5 にアップグレード！
      - name: Set up Python
        uses: actions/setup-python@v5

        with:
          python-version: '3.11' # 将来のサポート終了に備えて3.11にアップグレード！

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-genai # 最新のGeminiライブラリに切り替え

      - name: Run Python script
        env:
          # 💡 ここでGitHubのSecretsをPythonのプログラムに引き渡しているよ！
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python main.py
